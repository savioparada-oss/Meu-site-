<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sávio Dev | Hacker Bio</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Courier New', monospace;
}

body {
    background: black;
    color: white;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* MATRIX */
#matrix {
    position: fixed;
    top: 0;
    left: 0;
    z-index: -1;
}

/* CARD */
.container {
    background: rgba(0,0,0,0.85);
    padding: 25px;
    border-radius: 15px;
    border: 2px solid #bc13fe;
    box-shadow: 0 0 20px #bc13fe;
    text-align: center;
    width: 350px;
}

/* TEXTO */
.profile-name {
    font-size: 26px;
    margin-bottom: 5px;
    text-shadow: 0 0 10px #bc13fe;
}

.status {
    color: #bc13fe;
    margin-bottom: 20px;
}

/* BOTÕES */
.btn {
    display: block;
    margin: 10px 0;
    padding: 10px;
    border: 2px solid #bc13fe;
    color: white;
    text-decoration: none;
    border-radius: 5px;
    transition: 0.3s;
}

.btn:hover {
    background: #bc13fe;
    color: black;
}

/* STATS */
.stats {
    margin-top: 20px;
}

input {
    padding: 8px;
    margin-top: 10px;
    width: 120px;
    text-align: center;
}

/* BOTÃO LIKE */
.like-btn {
    margin-top: 10px;
    padding: 8px;
    cursor: pointer;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="container">
    <div class="profile-name">Sávio Dev</div>
    <div class="status">System Administrator</div>

    <!-- LINKS -->
    <a class="btn" href="https://www.instagram.com/savio_ss_" target="_blank">Instagram</a>
    <a class="btn" href="https://wa.me/5537998219330" target="_blank">WhatsApp</a>
    <a class="btn" href="https://github.com/savioparada-oss" target="_blank">GitHub</a>

    <!-- STATS -->
    <div class="stats">
        <p>👍 Likes: <span id="likes">1000</span></p>
        <p>👎 Dislikes: <span id="dislikes">10</span></p>

        <button class="like-btn" onclick="addLike()">+1 Like</button>

        <br>

        <!-- INPUT PERSONALIZADO -->
        <input type="number" id="customLikes" placeholder="Qtd likes">

        <br>

        <button class="like-btn" onclick="addCustomLikes()">Adicionar Likes</button>
    </div>
</div>

<script>
// MATRIX
const canvas = document.getElementById('matrix');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const letters = "01qwertyuiopasdfghjkl";
const fontSize = 16;
const columns = canvas.width / fontSize;
const drops = Array(Math.floor(columns)).fill(1);

function drawMatrix(){
    ctx.fillStyle = "rgba(0,0,0,0.05)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle = "#bc13fe";
    ctx.font = fontSize + "px monospace";

    drops.forEach((y,i)=>{
        const text = letters[Math.floor(Math.random()*letters.length)];
        ctx.fillText(text,i*fontSize,y*fontSize);

        if(y*fontSize > canvas.height && Math.random()>0.975){
            drops[i] = 0;
        }
        drops[i]++;
    });
}

setInterval(drawMatrix,35);

// ===== LIKES =====
let likes = 1000;
let dislikes = 10;

function addLike(){
    likes++;
    update();
}

function addCustomLikes(){
    let value = parseInt(document.getElementById("customLikes").value);

    if(!value || value <= 0){
        alert("Coloca um número válido");
        return;
    }

    likes += value;
    update();
}

function update(){
    document.getElementById("likes").innerText = likes;
    document.getElementById("dislikes").innerText = dislikes;
}

// RESPONSIVO
window.addEventListener('resize', ()=>{
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
</script>

</body>
</html>

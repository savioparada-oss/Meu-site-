<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sávio Dev | Portfólio</title>

<style>
:root {
    --bg: #000;
    --text: #fff;
    --primary: #bc13fe;
}

.light {
    --bg: #fff;
    --text: #000;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Courier New', monospace;
}

body {
    background: var(--bg);
    color: var(--text);
    text-align: center;
    transition: 0.3s;
}

/* BOTÃO TEMA */
.theme-toggle {
    position: fixed;
    top: 10px;
    right: 10px;
    background: var(--primary);
    border: none;
    padding: 10px;
    border-radius: 8px;
    cursor: pointer;
}

/* CONTAINER */
.container {
    background: rgba(0,0,0,0.85);
    padding: 25px;
    border-radius: 15px;
    border: 2px solid var(--primary);
    box-shadow: 0 0 20px var(--primary);
    max-width: 800px;
    margin: 15px auto;
}

/* TITULOS */
h2 {
    margin-bottom: 15px;
}

/* NOME */
.profile-name {
    font-size: 32px;
    text-shadow: 0 0 15px var(--primary);
}

/* FRASE */
.subtext {
    color: var(--primary);
    margin: 10px 0 20px 0;
    font-size: 14px;
}

/* GRID */
.cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
    gap: 15px;
}

/* CARD */
.card {
    border: 1px solid var(--primary);
    padding: 18px;
    border-radius: 12px;
    transition: 0.3s;
    background: rgba(255,255,255,0.02);
}

.card:hover {
    transform: scale(1.07);
    box-shadow: 0 0 25px var(--primary);
}

/* IMG */
.card img {
    width: 55px;
    height: 55px;
    margin-bottom: 8px;
}

/* TEXT */
.card h3 {
    color: var(--primary);
    font-size: 14px;
}

/* ICON */
.icon {
    font-size: 28px;
    display: block;
    margin-bottom: 8px;
}

/* BOTÃO */
.orcamento-btn {
    display: inline-block;
    margin: 15px 0;
    padding: 12px 22px;
    background: linear-gradient(90deg, var(--primary), #7a00ff);
    color: white;
    text-decoration: none;
    border-radius: 10px;
    font-weight: bold;
    box-shadow: 0 0 15px var(--primary);
}

.orcamento-btn:hover {
    transform: scale(1.05);
}

/* WHATS FLUTUANTE */
.whatsapp {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #25D366;
    color: white;
    padding: 15px;
    border-radius: 50%;
    text-decoration: none;
    font-size: 22px;
}

/* OFERTA */
.oferta {
    color: var(--primary);
    margin-top: 10px;
}

/* VAGAS */
.vagas {
    margin-top: 10px;
    font-weight: bold;
}
</style>
</head>

<body>

<button class="theme-toggle" onclick="toggleTheme()">🌗</button>

<!-- PERFIL -->
<div class="container">
    <div class="profile-name">Sávio Dev 🚀</div>
    <div class="subtext">
        Criação de sistemas e soluções tecnológicas com foco em inovação
    </div>
</div>

<!-- LINGUAGENS -->
<div class="container">
    <h2>💻 Linguagens</h2>
    <div class="cards">
        <div class="card"><img src="https://raw.githubusercontent.com/devicons/devicon/master/icons/python/python-original.svg"><h3>Python</h3></div>
        <div class="card"><img src="https://raw.githubusercontent.com/devicons/devicon/master/icons/cplusplus/cplusplus-original.svg"><h3>C++</h3></div>
        <div class="card"><img src="https://raw.githubusercontent.com/devicons/devicon/master/icons/javascript/javascript-original.svg"><h3>JavaScript</h3></div>
        <div class="card"><img src="https://raw.githubusercontent.com/devicons/devicon/master/icons/php/php-original.svg"><h3>PHP</h3></div>
        <div class="card"><img src="https://raw.githubusercontent.com/devicons/devicon/master/icons/java/java-original.svg"><h3>Java</h3></div>
    </div>
</div>

<!-- O QUE FAZ -->
<div class="container">
    <h2>🔥 O que eu faço</h2>
    <div class="cards">
        <div class="card"><span class="icon">🌐</span><h3>Sites</h3></div>
        <div class="card"><span class="icon">⚙️</span><h3>Sistemas</h3></div>
        <div class="card"><span class="icon">📱</span><h3>Apps</h3></div>
        <div class="card"><span class="icon">🎬</span><h3>Vídeos</h3></div>
        <div class="card"><span class="icon">📈</span><h3>Marketing Digital</h3></div>
        <div class="card"><span class="icon">💸</span><h3>Renda Extra</h3></div>
    </div>
</div>

<!-- BOTÃO -->
<div class="container">
    <a class="orcamento-btn" href="orcamento.html">Fazer Orçamento</a>

    <p class="oferta">🔥 Oferta acaba em: <span id="tempo"></span></p>
    <p class="vagas">⚠️ Restam 3 vagas essa semana</p>
</div>

<!-- WHATS -->
<a class="whatsapp" href="https://wa.me/5537998219330" target="_blank">💬</a>

<script>
// MODO CLARO/ESCURO
function toggleTheme() {
    document.body.classList.toggle("light");
}

// CONTADOR (10 minutos)
let tempo = 600;

setInterval(() => {
    let min = Math.floor(tempo / 60);
    let seg = tempo % 60;
    document.getElementById("tempo").innerText = min + ":" + (seg < 10 ? "0"+seg : seg);
    tempo--;
}, 1000);
</script>

</body>
</html>

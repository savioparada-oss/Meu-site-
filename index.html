<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sávio Dev | Hacker Bio</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Courier New', monospace;
}

body {
    background-color: #000;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    color: #fff;
}

#matrix {
    position: fixed;
    top: 0;
    left: 0;
    z-index: -1;
}

.container {
    background: rgba(0, 0, 0, 0.85);
    padding: 2.5rem;
    border-radius: 15px;
    border: 2px solid #bc13fe;
    box-shadow: 0 0 20px #bc13fe;
    text-align: center;
    width: 90%;
    max-width: 400px;
}

.profile-name {
    font-size: 1.8rem;
    margin-bottom: 0.5rem;
    text-shadow: 0 0 15px #bc13fe;
}

.status-text {
    font-size: 0.8rem;
    color: #bc13fe;
    margin-bottom: 2rem;
}

.links {
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.btn {
    text-decoration: none;
    color: #fff;
    padding: 12px;
    border: 2px solid #bc13fe;
    border-radius: 5px;
}

.btn:hover {
    background: #bc13fe;
    color: #000;
}

.stats {
    margin-top: 25px;
    padding-top: 20px;
    border-top: 1px solid #333;
}

.reaction-system {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 10px;
}

.reaction-btn {
    background: transparent;
    border: 1px solid #bc13fe;
    color: #fff;
    padding: 10px 20px;
    cursor: pointer;
    border-radius: 5px;
}

.reaction-btn:hover {
    background: #bc13fe;
    color: #000;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="container">
    <div class="profile-name">Sávio Dev</div>
    <div class="status-text">System Administrator</div>

    <div class="links">
        <a href="https://www.instagram.com/savio_ss_" target="_blank" class="btn">Instagram</a>
        <a href="https://wa.me/5537998219330" target="_blank" class="btn">WhatsApp</a>
        <a href="https://github.com/savioparada-oss" target="_blank" class="btn">GitHub</a>
    </div>

    <div class="stats">
        <div>ACCESS_LOG: <span id="view-val">0</span></div>

        <p>👍 <span id="like-val">0</span></p>
        <p>👎 <span id="dislike-val">0</span></p>

        <div class="reaction-system">
            <button class="reaction-btn" onclick="addLike()">👍 Like</button>
            <button class="reaction-btn" onclick="addDislike()">👎 Dislike</button>
        </div>
    </div>
</div>

<script>
// MATRIX
const canvas = document.getElementById('matrix');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const letters = "01qwertyuiopasdfghjkl";
const fontSize = 16;
const columns = canvas.width / fontSize;
const drops = Array(Math.floor(columns)).fill(1);

function drawMatrix() {
    ctx.fillStyle = "rgba(0,0,0,0.05)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle = "#bc13fe";
    ctx.font = fontSize + "px monospace";

    drops.forEach((y,i)=>{
        const text = letters[Math.floor(Math.random()*letters.length)];
        ctx.fillText(text,i*fontSize,y*fontSize);

        if(y*fontSize > canvas.height && Math.random()>0.975){
            drops[i]=0;
        }
        drops[i]++;
    });
}

setInterval(drawMatrix,35);

// ===== STORAGE =====
let views = parseInt(localStorage.getItem('savio_views') || 0);
let likes = parseInt(localStorage.getItem('savio_likes') || 0);
let dislikes = parseInt(localStorage.getItem('savio_dislikes') || 0);

// Views
views++;
localStorage.setItem('savio_views', views);

// Mostrar
document.getElementById('view-val').innerText = views;
document.getElementById('like-val').innerText = likes;
document.getElementById('dislike-val').innerText = dislikes;

// FUNÇÕES
function addLike(){
    likes++;
    localStorage.setItem('savio_likes', likes);
    document.getElementById('like-val').innerText = likes;
}

function addDislike(){
    dislikes++;
    localStorage.setItem('savio_dislikes', dislikes);
    document.getElementById('dislike-val').innerText = dislikes;
}

// RESPONSIVO
window.addEventListener('resize', ()=>{
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
</script>

</body>
</html>
